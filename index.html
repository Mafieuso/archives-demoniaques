<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codex-Obscura | Archives Interdites</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Sans+JP:wght@200;400;700&family=Charm:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #800000; --accent: #d4af37; --bg: #030305;
            --card-bg: rgba(15, 15, 20, 0.95); --text: #e0e0e0;
            --gold: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
        }

        * { box-sizing: border-box; scroll-behavior: smooth; }
        
        body {
            font-family: 'Noto Sans JP', sans-serif; background: var(--bg);
            color: var(--text); margin: 0; padding: 60px 15px; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        /* --- ANIMATIONS DE FOND (PARTICULES) --- */
        .bg-animation {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #200000 0%, #050507 100%);
            z-index: -1;
        }
        .particle {
            position: absolute; background: #ff0000; border-radius: 50%;
            filter: blur(5px); opacity: 0.2; animation: float 12s infinite linear;
        }
        @keyframes float {
            0% { transform: translateY(110vh) scale(0); opacity: 0; }
            50% { opacity: 0.4; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* --- BARRE D'AUTHENTIFICATION --- */
        #authBar {
            position: fixed; top: 25px; right: 25px; background: rgba(0,0,0,0.9);
            padding: 12px 20px; border: 1px solid #333; border-left: 5px solid var(--accent);
            z-index: 100; font-family: 'Cinzel', serif; backdrop-filter: blur(15px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        #authBar input { background: transparent; border: none; border-bottom: 1px solid #444; color: var(--accent); width: 100px; outline: none; padding: 5px; text-align: center; font-family: 'Cinzel'; }

        /* --- TITRE ET STATS --- */
        .header-title {
            font-family: 'Cinzel', serif; font-size: clamp(2.5rem, 10vw, 5.5rem); font-weight: 900; 
            letter-spacing: 20px; margin: 0 0 30px 0; background: var(--gold);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.4));
            text-align: center; animation: glow 3s infinite alternate;
        }
        @keyframes glow { from { filter: drop-shadow(0 0 10px rgba(212,175,55,0.2)); } to { filter: drop-shadow(0 0 25px rgba(212,175,55,0.6)); } }

        .global-stats {
            font-family: 'Cinzel', serif; font-size: 1.2rem; color: var(--accent);
            margin-bottom: 40px; letter-spacing: 3px; border-bottom: 1px solid var(--accent);
            padding-bottom: 10px; text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }
        #totalCount { font-weight: 900; font-size: 1.6rem; margin-left: 10px; transition: 0.5s; }

        /* --- FORMULAIRE --- */
        #mainForm {
            background: var(--card-bg); width: 100%; max-width: 1000px; padding: 50px;
            display: none; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;
            margin-bottom: 100px; border: 1px solid #333; position: relative;
            box-shadow: 0 0 80px rgba(0,0,0,0.9); border-top: 4px solid var(--accent);
            animation: slideDown 0.6s ease-out;
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        input, select, textarea { background: #0a0a0a; border: 1px solid #222; color: #fff; padding: 18px; outline: none; transition: 0.3s; font-family: 'Noto Sans JP'; }
        input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(212,175,55,0.1); }
        textarea { grid-column: 1 / -1; height: 120px; border-left: 3px solid var(--primary); }

        #btnSubmit {
            grid-column: 1 / -1; background: #000; color: var(--accent); border: 1px solid var(--accent);
            padding: 22px; cursor: pointer; font-family: 'Cinzel', serif; letter-spacing: 6px;
            text-transform: uppercase; font-weight: bold; transition: 0.4s;
        }
        #btnSubmit:hover { background: var(--accent); color: #000; box-shadow: 0 0 30px var(--accent); }

        /* --- REGISTRE ET CARTES --- */
        .registry-wrapper { width: 100%; max-width: 1200px; }
        .breath-group { margin-bottom: 50px; background: rgba(0,0,0,0.7); border: 1px solid #222; overflow: hidden; transition: 0.4s ease; }
        
        .breath-Eau { border-top: 3px solid #00a2ff; }
        .breath-Flamme { border-top: 3px solid #ff4500; }
        .breath-Foudre { border-top: 3px solid #ffff00; }
        .breath-Roche { border-top: 3px solid #8b4513; }
        .breath-Brume { border-top: 3px solid #a0a0a0; }
        .breath-Son { border-top: 3px solid #ff00ff; }
        .breath-Fleur { border-top: 3px solid #ffb7c5; }
        .breath-Mort { border-top: 3px solid #444; opacity: 0.7; }

        .breath-header { background: #0a0a0a; padding: 20px 40px; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center; }
        .breath-header h3 { font-family: 'Charm', cursive; font-size: 1.8rem; margin: 0; color: #fff; letter-spacing: 4px; }
        
        .member-list { width: 100%; border-collapse: collapse; }
        .member-list td { padding: 20px; text-align: center; border-bottom: 1px solid #111; transition: 0.3s; }
        .member-list tr:hover td { background: rgba(255,255,255,0.02); }

        .pseudo { font-family: 'Cinzel', serif; cursor: pointer; color: #fff; font-weight: bold; font-size: 1.1rem; transition: 0.2s; position: relative; }
        .pseudo:hover { color: var(--accent); letter-spacing: 1px; }
        .pseudo.mort { text-decoration: line-through; color: #555; }

        /* --- BADGES DE RANG --- */
        .badge { padding: 8px 15px; font-weight: 700; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; display: inline-block; min-width: 120px; border-radius: 2px; }
        .Pilier { background: #4b0000; border: 1px solid #ff0000; color: #ffcccc; box-shadow: 0 0 10px #600000; }
        .Kinoe, .Kinoto { background: #300000; color: #ffffff; border: 1px solid #800000; }
        .Hinoe, .Hinoto { background: #5d2906; color: #fff; border: 1px solid #8b4513; }
        .Tsuchinoe, .Tsuchinoto { background: #2c2c2c; color: #d4af37; border: 1px solid #d4af37; }
        .Kanoe, .Kanoto { background: #444; color: #eee; border: 1px solid #888; }
        .Mizunoe { background: #004d1a; color: #aaffaa; border: 1px solid #00ff66; }
        .Mizunoto { background: #e6ffed; color: #004d1a; border: 1px solid #004d1a; }

        /* --- MODAL --- */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(15px); }
        #modalContent { width: 95%; max-width: 750px; max-height: 90vh; background: #0a0a0c; border: 1px solid #222; padding: 50px; border-top: 5px solid var(--accent); overflow-y: auto; position: relative; animation: zoomIn 0.4s ease-out; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        #details img { display: block; max-width: 100%; max-height: 450px; border: 1px solid #333; margin: 30px auto; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .close-btn { float: right; color: var(--accent); font-size: 3rem; cursor: pointer; line-height: 1; transition: 0.3s; }
        .close-btn:hover { transform: rotate(90deg); color: #fff; }

        #photoLabel { padding: 25px; border: 1px dashed #444; cursor: pointer; display: block; transition: 0.3s; text-align: center; }
        #photoLabel.loaded { border-color: var(--accent); background: rgba(212, 175, 55, 0.1); color: var(--accent) !important; }
        
        .show-more-btn { width: 100%; background: #000; border: none; padding: 15px; color: var(--accent); font-family: 'Cinzel'; cursor: pointer; border-top: 1px solid #222; transition: 0.3s; letter-spacing: 2px; }
        .show-more-btn:hover { background: #080808; letter-spacing: 4px; color: #fff; }
    </style>
</head>
<body>

    <div class="bg-animation" id="bgAnim"></div>

    <div id="authBar">
        STATUS : <span id="statusBadge" style="color:var(--accent)">VISITEUR</span>
        <input type="password" id="passInput" placeholder="Sceau..." onkeypress="checkAuth(event)">
    </div>

    <h1 class="header-title">Codex-Obscura</h1>

    <div class="global-stats">
        POURFENDEURS RÉPERTORIÉS : <span id="totalCount">0</span>
    </div>

    <form id="mainForm">
        <input type="text" id="nom" placeholder="IDENTITÉ DU GUERRIER" required>
        <select id="rang">
            <option value="Pilier">RANG : PILIER</option>
            <option value="Kinoe">RANG : KINOE</option>
            <option value="Kinoto">RANG : KINOTO</option>
            <option value="Hinoe">RANG : HINOE</option>
            <option value="Hinoto">RANG : HINOTO</option>
            <option value="Tsuchinoe">RANG : TSUCHINOE</option>
            <option value="Tsuchinoto">RANG : TSUCHINOTO</option>
            <option value="Kanoe">RANG : KANOE</option>
            <option value="Kanoto">RANG : KANOTO</option>
            <option value="Mizunoe">RANG : MIZUNOE</option>
            <option value="Mizunoto">RANG : MIZUNOTO</option>
        </select>
        <select id="souffle">
            <option value="Inconnu">SÉLECTION DU SOUFFLE</option>
            <option value="Souffle de l'Eau">Souffle de l'Eau</option>
            <option value="Souffle de la Flamme">Souffle de la Flamme</option>
            <option value="Souffle de la Foudre">Souffle de la Foudre</option>
            <option value="Souffle de la Roche">Souffle de la Roche</option>
            <option value="Souffle de la Brume">Souffle de la Brume</option>
            <option value="Souffle du Son">Souffle du Son</option>
            <option value="Souffle de la Fleur">Souffle de la Fleur</option>
        </select>
        <select id="statut"><option value="Vivant">VIVANT</option><option value="Mort">DÉCÉDÉ</option></select>
        <input type="text" id="pilier_nom" placeholder="PILIER RÉFÉRENT">
        <input type="text" id="kinoe_nom" placeholder="KINOÉ RÉFÉRENT">
        <input type="number" id="jours_entrainement" placeholder="JOURS DE DISCIPLINE">
        <input type="text" id="veilleur_nom" placeholder="SIGNATURE VEILLEUR" required>
        <textarea id="info" placeholder="OBSERVATIONS ET SECRETS..."></textarea>
        <div style="grid-column: 1 / -1;">
            <label id="photoLabel">
                <span id="labelText">💠 SCELLER UN PORTRAIT 💠</span>
                <input type="file" id="photo" accept="image/*" style="display:none" onchange="indicateImage(this)">
            </label>
        </div>
        <button type="submit" id="btnSubmit">Inscrire dans le Codex</button>
    </form>

    <div class="registry-wrapper" id="registryBody"></div>

    <div id="modal"><div id="modalContent"><span class="close-btn" onclick="fermer()">&times;</span><div id="details"></div></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDHc5tFYxaWeGUkrxrGJAFjeEe1RJEJTHU",
            authDomain: "archives-demoniaques.firebaseapp.com",
            projectId: "archives-demoniaques",
            storageBucket: "archives-demoniaques.firebasestorage.app",
            messagingSenderId: "660726727180",
            appId: "1:660726727180:web:de33021940c7c8b0d8a429"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentRole = "visiteur";
        let records = [];

        const breathDecor = {
            "Souffle de l'Eau": { e: "🌊", c: "Eau" }, "Souffle de la Flamme": { e: "🔥", c: "Flamme" },
            "Souffle de la Foudre": { e: "⚡", c: "Foudre" }, "Souffle de la Roche": { e: "🪨", c: "Roche" },
            "Souffle de la Brume": { e: "🌫️", c: "Brume" }, "Souffle du Son": { e: "🔊", c: "Son" },
            "Souffle de la Fleur": { e: "🌸", c: "Fleur" }, "POURFENDEURS TOMBÉS": { e: "🥀", c: "Mort" }
        };

        // --- BACKGROUND PARTICULES ---
        const bg = document.getElementById('bgAnim');
        for(let i=0; i<25; i++) {
            const p = document.createElement('div'); p.className = 'particle';
            p.style.width = p.style.height = (Math.random() * 8 + 4) + 'px';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDelay = Math.random() * 12 + 's';
            bg.appendChild(p);
        }

        window.indicateImage = (input) => {
            if(input.files && input.files[0]) {
                document.getElementById("photoLabel").classList.add("loaded");
                document.getElementById("labelText").innerText = "✅ PORTRAIT CAPTURÉ";
            }
        };

        window.checkAuth = (e) => {
            if(e.key === "Enter"){
                currentRole = e.target.value === "PassMaitre" ? "gerant" : (e.target.value === "PassVeilleur" ? "veilleur" : "visiteur");
                document.getElementById("statusBadge").innerText = currentRole.toUpperCase();
                document.getElementById("mainForm").style.display = currentRole !== 'visiteur' ? 'grid' : 'none';
                renderTable(); e.target.value = "";
            }
        };

        function renderTable() {
            onSnapshot(collection(db, "pourfendeurs"), (snap) => {
                records = []; snap.forEach(s => records.push({ id: s.id, ...s.data() }));
                document.getElementById("totalCount").innerText = records.length;
                const container = document.getElementById("registryBody");
                container.innerHTML = "";
                
                const vivants = records.filter(r => r.statut !== "Mort");
                const morts = records.filter(r => r.statut === "Mort");
                
                const groups = vivants.reduce((acc, obj) => {
                    const s = obj.souffle || "Inconnu";
                    if (!acc[s]) acc[s] = []; acc[s].push(obj); return acc;
                }, {});
                
                Object.keys(groups).sort().forEach(n => createSection(n, groups[n], container));
                if(morts.length > 0) createSection("POURFENDEURS TOMBÉS", morts, container);
            });
        }

        function createSection(name, members, container) {
            const decor = breathDecor[name] || {e:"⚔️", c:"Default"};
            const groupDiv = document.createElement("div");
            groupDiv.className = `breath-group breath-${decor.c}`;
            let html = `<div class="breath-header"><h3>${decor.e} ${name.toUpperCase()}</h3></div><table class="member-list">`;
            
            members.forEach((d, idx) => {
                const isHidden = idx >= 3;
                let actions = "";
                if(currentRole !== 'visiteur') {
                    actions += `<td><button onclick="preparerModif('${d.id}')" style="background:none;border:none;cursor:pointer;font-size:1.2rem;">🖋️</button>`;
                    if(currentRole === 'gerant') actions += `<button onclick="supprimerRecord('${d.id}')" style="background:none;border:none;cursor:pointer;color:#500;margin-left:15px;font-size:1.2rem;">✖</button>`;
                    actions += `</td>`;
                }
                html += `<tr class="${isHidden ? 'hidden-members' : ''}" style="${isHidden ? 'display:none' : ''}">
                    <td style="width:25%"><span class="badge ${d.rang}">${d.rang}</span></td>
                    <td><span class="pseudo ${d.statut === 'Mort' ? 'mort' : ''}" onclick="voir('${d.id}')">${d.nom}</span></td>
                    <td style="font-size:0.8rem; color:#666;">${d.statut === 'Mort' ? 'DÉCÉDÉ' : (d.jours_entrainement || 0) + ' Jours'}</td>
                    ${actions}
                </tr>`;
            });
            html += `</table>`;
            if (members.length > 3) html += `<button class="show-more-btn" onclick="toggleBreath(this)">OUVRIR LE PARCHEMIN (+${members.length-3})</button>`;
            groupDiv.innerHTML = html; container.appendChild(groupDiv);
        }

        window.toggleBreath = (btn) => {
            const group = btn.closest('.breath-group');
            const rows = group.querySelectorAll('.hidden-members');
            const isExp = btn.innerText.includes("OUVRIR");
            rows.forEach(r => r.style.display = isExp ? 'table-row' : 'none');
            btn.innerText = isExp ? "SCELLER LE PARCHEMIN" : "OUVRIR LE PARCHEMIN (+" + rows.length + ")";
        };

        window.voir = (id) => {
            const d = records.find(r => r.id === id);
            const dateStr = d.date_enregistrement ? new Date(d.date_enregistrement.seconds * 1000).toLocaleDateString('fr-FR', {day:'numeric', month:'long', year:'numeric'}) : "Inconnue";
            document.getElementById("details").innerHTML = `
                <div style="text-align:center">
                    <h2 style="font-family:Cinzel; font-size:2.8rem; color:var(--accent); margin:0; letter-spacing:5px;">${d.nom}</h2>
                    <div class="badge ${d.rang}" style="margin-top:15px">${d.rang}</div>
                </div>
                ${d.photo ? `<img src="${d.photo}">` : ""}
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; font-family:Cinzel; font-size:0.9rem; margin-top:30px; border-top:1px solid #222; padding-top:25px; color:#aaa;">
                    <div>SOUFFLE : <span style="color:#fff">${d.souffle}</span></div>
                    <div>PILIER RÉFÉRENT : <span style="color:#fff">${d.pilier_nom || 'Non spécifié'}</span></div>
                    <div>KINOÉ RÉFÉRENT : <span style="color:#fff">${d.kinoe_nom || 'N/A'}</span></div>
                    <div>DISCIPLINE : <span style="color:#fff">${d.jours_entrainement || 0} Jours</span></div>
                    <div style="grid-column: 1 / -1; border-top: 1px solid #111; padding-top: 10px; color:#666; font-size:0.75rem;">
                        RAPPORT ARCHIVÉ LE : ${dateStr} | STATUT ACTUEL : ${d.statut}
                    </div>
                </div>
                <div style="background:#050505; padding:30px; margin-top:30px; border-left:4px solid var(--primary); font-family:Charm; font-size:1.3rem; line-height:1.6; color:#ddd;">"${d.info || 'Aucune observation enregistrée.'}"</div>
                <div style="margin-top:25px; color:#444; font-family:Cinzel; font-size:0.8rem; text-align:right;">SCRIBÉ PAR : ${d.veilleur}</div>`;
            document.getElementById("modal").style.display = "flex";
        };

        window.preparerModif = (id) => {
            const d = records.find(r => r.id === id); window.editId = id;
            document.getElementById("nom").value = d.nom;
            document.getElementById("rang").value = d.rang;
            document.getElementById("souffle").value = d.souffle;
            document.getElementById("statut").value = d.statut;
            document.getElementById("pilier_nom").value = d.pilier_nom || "";
            document.getElementById("kinoe_nom").value = d.kinoe_nom || "";
            document.getElementById("jours_entrainement").value = d.jours_entrainement || 0;
            document.getElementById("veilleur_nom").value = d.veilleur || "";
            document.getElementById("info").value = d.info || "";
            document.getElementById("btnSubmit").innerText = "Actualiser le Sceau";
            window.scrollTo({top:0, behavior:'smooth'});
        };

        document.getElementById("mainForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("btnSubmit"); btn.disabled = true;
            try {
                const f = document.getElementById("photo").files[0];
                const img = f ? await compress(f) : (window.editId ? records.find(r => r.id === window.editId).photo : null);
                const data = {
                    nom: document.getElementById("nom").value, rang: document.getElementById("rang").value,
                    souffle: document.getElementById("souffle").value, statut: document.getElementById("statut").value,
                    pilier_nom: document.getElementById("pilier_nom").value, kinoe_nom: document.getElementById("kinoe_nom").value, 
                    jours_entrainement: document.getElementById("jours_entrainement").value,
                    veilleur: document.getElementById("veilleur_nom").value, info: document.getElementById("info").value, photo: img,
                    date_enregistrement: serverTimestamp()
                };
                if(window.editId) { await updateDoc(doc(db, "pourfendeurs", window.editId), data); window.editId = null; }
                else { await addDoc(collection(db, "pourfendeurs"), data); }
                document.getElementById("mainForm").reset();
                document.getElementById("photoLabel").classList.remove("loaded");
                document.getElementById("labelText").innerText = "💠 SCELLER UN PORTRAIT 💠";
                btn.innerText = "Inscrire dans le Codex";
            } catch (err) { alert(err.message); } finally { btn.disabled = false; }
        });

        const compress = (f) => new Promise(res => {
            const r = new FileReader(); r.readAsDataURL(f);
            r.onload = (e) => {
                const i = new Image(); i.src = e.target.result;
                i.onload = () => {
                    const c = document.createElement('canvas'); const w = 500;
                    c.width = w; c.height = i.height*(w/i.width);
                    c.getContext('2d').drawImage(i,0,0,c.width,c.height);
                    res(c.toDataURL('image/jpeg', 0.65));
                };
            };
        });

        window.supprimerRecord = async (id) => { if(confirm("Voulez-vous rayer ce pourfendeur des archives ?")) await deleteDoc(doc(db, "pourfendeurs", id)); };
        window.fermer = () => document.getElementById("modal").style.display = "none";
        renderTable();
    </script>
</body>
</html>
