<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archives Impériales - Demon Slayer RP</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Sans+JP:wght@200;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #8b0000; --accent: #ffd700; --bg: #050505;
            --card-bg: rgba(20, 20, 20, 0.95); --text: #f0f0f0;
            --gold: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Noto Sans JP', sans-serif; background: var(--bg);
            background-image: radial-gradient(circle at center, #1a0808 0%, #050505 100%);
            color: var(--text); margin: 0; padding: 40px 20px; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        #authBar {
            position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.8);
            padding: 10px 20px; border: 1px solid #333; border-radius: 2px; z-index: 100;
            font-family: 'Cinzel', serif; font-size: 0.7rem; border-left: 3px solid var(--primary);
        }
        #authBar input { background: transparent; border: none; border-bottom: 1px solid #555; color: var(--accent); width: 80px; outline: none; margin-left: 10px; transition: 0.3s; }
        #authBar input:focus { width: 120px; border-color: var(--accent); }

        .header-container { text-align: center; margin-bottom: 60px; }
        .header-title {
            font-family: 'Cinzel', serif; font-size: 3.5rem; letter-spacing: 12px; margin: 0;
            background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }
        .header-subtitle { font-family: 'Cinzel', serif; color: var(--primary); letter-spacing: 5px; font-size: 0.9rem; margin-top: 10px; opacity: 0.8; }

        #mainForm {
            background: var(--card-bg); width: 100%; max-width: 1000px; padding: 40px;
            border: 1px solid #2a2a2a; display: none; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px;
            margin-bottom: 60px; border-top: 4px solid var(--primary);
        }

        input, select, textarea { 
            background: #0a0a0a; border: 1px solid #333; color: #fff; padding: 15px; 
            border-radius: 0; font-family: inherit; outline: none;
        }
        input:focus, select:focus { border-color: var(--accent); }
        textarea { grid-column: 1 / -1; height: 100px; }

        #btnSubmit {
            grid-column: 1 / -1; background: #000; color: #fff; border: 1px solid var(--primary);
            padding: 18px; cursor: pointer; font-family: 'Cinzel', serif; letter-spacing: 4px;
            text-transform: uppercase; transition: 0.4s;
        }
        #btnSubmit:hover { background: var(--primary); box-shadow: 0 0 20px rgba(139,0,0,0.5); }

        .table-container { width: 100%; max-width: 1100px; background: rgba(10,10,10,0.8); border: 1px solid #222; }
        table { width: 100%; border-collapse: collapse; }
        th { font-family: 'Cinzel', serif; color: var(--accent); padding: 20px; font-size: 0.8rem; background: #000; border-bottom: 1px solid #333; }
        td { padding: 15px; text-align: center; border-bottom: 1px solid #111; color: #aaa; }
        
        .badge { padding: 8px 16px; font-weight: bold; font-size: 0.7rem; text-transform: uppercase; border-radius: 1px; display: inline-block; color: #fff; }
        .Pilier { background: #4b0000; border: 1px solid #8b0000; box-shadow: 0 0 10px #4b0000; }
        .Kinoe { background: #FF0000; }
        .Kinoto, .Hinoe, .Hinoto { background: #FF8C00; }
        .Tsuchinoe, .Tsuchinoto { background: #FFA500; }
        .Kanoe, .Kanoto { background: #FFFF00; color: #000; }
        .Mizunoe, .Mizunoto { background: #008000; }

        .pseudo { font-family: 'Cinzel', serif; cursor: pointer; font-weight: bold; color: #fff; transition: 0.3s; }
        .pseudo:hover { color: var(--accent); text-shadow: 0 0 8px var(--accent); }

        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; justify-content: center; align-items: center; }
        #modalContent { width: 95%; max-width: 600px; background: #080808; border: 1px solid #333; padding: 40px; position: relative; }
        #details img { width: 100%; max-height: 350px; object-fit: cover; border: 1px solid #222; margin: 20px 0; }
        .close-btn { position: absolute; top: 15px; right: 20px; color: var(--primary); font-size: 2rem; cursor: pointer; }
        .meta-footer { margin-top: 30px; font-size: 0.65rem; color: #444; border-top: 1px solid #1a1a1a; padding-top: 15px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div id="authBar">
        STATUS: <span id="statusBadge" style="color:var(--accent)">VISITEUR</span>
        <input type="password" id="passInput" placeholder="Clé..." onkeypress="checkAuth(event)">
    </div>

    <div class="header-container">
        <h1 class="header-title">Archives Impériales</h1>
        <div class="header-subtitle">Registre Officiel des Souffles et des Grades</div>
    </div>

    <form id="mainForm">
        <input type="text" id="nom" placeholder="IDENTITÉ DU POURFENDEUR" required>
        <select id="rang">
            <option value="Pilier">RANG : PILIER</option>
            <option value="Kinoe">RANG : KINOE</option>
            <option value="Kinoto">RANG : KINOTO</option>
            <option value="Hinoe">RANG : HINOE</option>
            <option value="Hinoto">RANG : HINOTO</option>
            <option value="Tsuchinoe">RANG : TSUCHINOE</option>
            <option value="Tsuchinoto">RANG : TSUCHINOTO</option>
            <option value="Kanoe">RANG : KANOE</option>
            <option value="Kanoto">RANG : KANOTO</option>
            <option value="Mizunoe">RANG : MIZUNOE</option>
            <option value="Mizunoto">RANG : MIZUNOTO</option>
        </select>
        <select id="souffle">
            <option value="">SÉLECTIONNER UN SOUFFLE</option>
            <option value="Souffle de la Roche">Souffle de la Roche</option>
            <option value="Souffle du Son">Souffle du Son</option>
            <option value="Souffle de l'Eau">Souffle de l'Eau</option>
            <option value="Souffle de la Flamme">Souffle de la Flamme</option>
            <option value="Souffle de la Foudre">Souffle de la Foudre</option>
            <option value="Souffle de la Brume">Souffle de la Brume</option>
            <option value="Souffle de la Fleur">Souffle de la Fleur</option>
        </select>
        <input type="text" id="brigade" placeholder="BRIGADE">
        <input type="text" id="pilier_ref" placeholder="PILIER RÉFÉRENT">
        <input type="text" id="veilleur_nom" placeholder="SIGNATURE DU VEILLEUR" required>
        <textarea id="info" placeholder="RAPPORTS ET OBSERVATIONS..."></textarea>
        <div style="grid-column: 1 / -1; border: 1px dashed #333; padding: 15px; text-align: center;">
            <label style="cursor:pointer; color:#777; font-size:0.7rem;">🖼️ PORTRAIT : <input type="file" id="photo" accept="image/*" style="display:none"></label>
        </div>
        <button type="submit" id="btnSubmit">Sceller l'Archive</button>
    </form>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 20%;">GRADE</th>
                    <th>IDENTITÉ</th>
                    <th>SOUFFLE</th>
                    <th id="thAction" style="display:none; width: 15%;">ACTIONS</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div id="modal"><div id="modalContent"><span class="close-btn" onclick="fermer()">&times;</span><div id="details"></div></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDHc5tFYxaWeGUkrxrGJAFjeEe1RJEJTHU",
            authDomain: "archives-demoniaques.firebaseapp.com",
            projectId: "archives-demoniaques",
            storageBucket: "archives-demoniaques.firebasestorage.app",
            messagingSenderId: "660726727180",
            appId: "1:660726727180:web:de33021940c7c8b0d8a429"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentRole = "visiteur";
        let editId = null;

        const hierarchy = { "Pilier":0, "Kinoe":1, "Kinoto":2, "Hinoe":3, "Hinoto":4, "Tsuchinoe":5, "Tsuchinoto":6, "Kanoe":7, "Kanoto":8, "Mizunoe":9, "Mizunoto":10 };

        window.checkAuth = (e) => {
            if(e.key === "Enter"){
                const p = e.target.value;
                if(p === "PassMaitre") currentRole = "gerant";
                else if(p === "PassVeilleur") currentRole = "veilleur";
                else currentRole = "visiteur";
                updateUI(); e.target.value = "";
            }
        };

        function updateUI(){
            document.getElementById("statusBadge").innerText = currentRole.toUpperCase();
            const canEdit = (currentRole !== 'visiteur');
            document.getElementById("mainForm").style.display = canEdit ? 'grid' : 'none';
            document.getElementById("thAction").style.display = canEdit ? 'table-cell' : 'none';
            if(localStorage.getItem('veilleur')) document.getElementById('veilleur_nom').value = localStorage.getItem('veilleur');
            renderTable();
        }

        function renderTable() {
            onSnapshot(collection(db, "pourfendeurs"), (snap) => {
                const tableBody = document.getElementById("tableBody");
                tableBody.innerHTML = "";
                let list = [];
                snap.forEach(s => list.push({ id: s.id, ...s.data() }));
                list.sort((a,b) => (hierarchy[a.rang] ?? 99) - (hierarchy[b.rang] ?? 99));

                list.forEach(d => {
                    const tr = document.createElement("tr");
                    let actions = "";
                    if(currentRole !== 'visiteur'){
                        actions = `<td>
                            <button onclick="preparerModif('${d.id}', ${JSON.stringify(d).replace(/"/g, '&quot;')})" style="background:none; border:none; cursor:pointer;">🖋️</button>
                            ${currentRole === 'gerant' ? `<button onclick="suppr('${d.id}')" style="background:none; border:none; color:#444; cursor:pointer; margin-left:10px;">✖</button>` : ""}
                        </td>`;
                    }
                    tr.innerHTML = `<td><span class="badge ${d.rang}">${d.rang}</span></td><td><span class="pseudo">${d.nom}</span></td><td>${d.souffle || 'N/A'}</td>${actions}`;
                    tr.querySelector(".pseudo").onclick = () => voir(d);
                    tableBody.appendChild(tr);
                });
            });
        }

        window.voir = (d) => {
            const date = d.dateModif ? new Date(d.dateModif).toLocaleDateString('fr-FR', {day:'numeric', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit'}) : "Inconnue";
            document.getElementById("details").innerHTML = `
                <div style="text-align:center">
                    <h2 style="font-family:Cinzel; font-size:2.5rem; margin:0; color:#fff">${d.nom}</h2>
                    <div class="badge ${d.rang}" style="margin-top:10px">${d.rang}</div>
                </div>
                ${d.photo ? `<img src="${d.photo}">` : "<div style='height:30px'></div>"}
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; font-family:Cinzel; font-size:0.8rem; border-top:1px solid #222; padding-top:20px;">
                    <div><span style="color:#555">🌬️ SOUFFLE :</span><br>${d.souffle || 'N/A'}</div>
                    <div><span style="color:#555">🛡️ BRIGADE :</span><br>${d.brigade || 'N/A'}</div>
                    <div><span style="color:#555">⛩️ RÉFÉRENT :</span><br>${d.pilier_ref || 'N/A'}</div>
                </div>
                <div style="background:#050505; padding:20px; border:1px solid #1a1a1a; margin-top:25px; color:#ccc; font-size:0.9rem">
                    ${d.info || 'Aucune observation.'}
                </div>
                <div class="meta-footer">
                    <span>✍️ VEILLEUR : ${d.veilleur || 'INCONNU'}</span>
                    <span>MODIFIÉ LE : ${date}</span>
                </div>
            `;
            document.getElementById("modal").style.display = "flex";
        };

        window.fermer = () => document.getElementById("modal").style.display = "none";

        window.preparerModif = (id, data) => {
            editId = id;
            document.getElementById("nom").value = data.nom;
            document.getElementById("rang").value = data.rang;
            document.getElementById("souffle").value = data.souffle || "";
            document.getElementById("brigade").value = data.brigade || "";
            document.getElementById("pilier_ref").value = data.pilier_ref || "";
            document.getElementById("veilleur_nom").value = data.veilleur || "";
            document.getElementById("info").value = data.info || "";
            document.getElementById("btnSubmit").innerText = "Mettre à jour l'archive";
            window.scrollTo({top:0, behavior:'smooth'});
        };

        window.suppr = async (id) => { if(confirm("Détruire ce registre ?")) await deleteDoc(doc(db, "pourfendeurs", id)); };

        const compress = (f) => new Promise(res => {
            const r = new FileReader(); r.readAsDataURL(f);
            r.onload = (e) => {
                const i = new Image(); i.src = e.target.result;
                i.onload = () => {
                    const c = document.createElement('canvas'); const w = 600; const s = w/i.width;
                    c.width = w; c.height = i.height*s;
                    const ctx = c.getContext('2d'); ctx.drawImage(i,0,0,c.width,c.height);
                    res(c.toDataURL('image/jpeg', 0.6));
                };
            };
        });

        document.getElementById("mainForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("btnSubmit"); btn.disabled = true;
            const vn = document.getElementById("veilleur_nom").value; localStorage.setItem('veilleur', vn);

            try {
                const file = document.getElementById("photo").files[0];
                let img = null; if(file) img = await compress(file);

                const data = {
                    nom: document.getElementById("nom").value,
                    rang: document.getElementById("rang").value,
                    souffle: document.getElementById("souffle").value,
                    brigade: document.getElementById("brigade").value,
                    pilier_ref: document.getElementById("pilier_ref").value,
                    veilleur: vn,
                    info: document.getElementById("info").value,
                    dateModif: Date.now()
                };
                if(img) data.photo = img;

                if(editId) { await updateDoc(doc(db, "pourfendeurs", editId), data); editId = null; btn.innerText = "Sceller l'Archive"; }
                else { await addDoc(collection(db, "pourfendeurs"), data); }
                document.getElementById("mainForm").reset();
                document.getElementById('veilleur_nom').value = vn;
            } catch (err) { alert(err.message); }
            finally { btn.disabled = false; }
        });

        updateUI();
    </script>
</body>
</html>
