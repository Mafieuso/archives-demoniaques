<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs,
  deleteDoc, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 TES CLÉS FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyDHc5tFYxaWeGUkrxrGJAFjeEe1RJEJTHU",
  authDomain: "archives-demoniaques.firebaseapp.com",
  projectId: "archives-demoniaques",
  storageBucket: "archives-demoniaques.firebasestorage.app",
  messagingSenderId: "660726727180",
  appId: "1:660726727180:web:de33021940c7c8b0d8a429"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let editId = null;

// 🩸 Calcul automatique de la menace selon le rang
function getMenace(rang){
  switch(rang){
    case "Mizunoto":
    case "Mizunoe": return "Faible";
    case "Kanoto":
    case "Kanoe": return "Fort";
    case "Tsuchinoto":
    case "Tsuchinoe": return "Puissant";
    case "Hinoto":
    case "Hinoe":
    case "Kinoto": return "TresPuissant";
    case "Kinoe": return "Dangereux";
  }
}

// 🧠 Charger tous les pourfendeurs
async function render(){
  const table = document.getElementById("tableBody");
  table.innerHTML = "";

  const snapshot = await getDocs(collection(db, "pourfendeurs"));

  snapshot.forEach(docSnap => {
    const d = docSnap.data();

    table.innerHTML += `
      <tr>
        <td class="pseudo" onclick='voir(${JSON.stringify(d).replace(/'/g,"&#39;")})'>${d.nom}</td>
        <td>${d.rang}</td>
        <td>${d.souffle}</td>
        <td class="${d.menace}">${d.menace}</td>
        <td>
          <button onclick='modifier("${docSnap.id}", ${JSON.stringify(d).replace(/'/g,"&#39;")})'>Modifier</button>
          <button onclick='supprimer("${docSnap.id}")'>Supprimer</button>
        </td>
      </tr>
    `;
  });
}

// 👁️ Voir fiche
window.voir = function(d){
  modalContent.innerHTML = `
    <h2>${d.nom}</h2>
    ${d.photo ? `<img src="${d.photo}">` : ""}
    <p><b>Rang:</b> ${d.rang}</p>
    <p><b>Brigade:</b> ${d.brigade}</p>
    <p><b>Souffle:</b> ${d.souffle}</p>
    <p><b>Pilier:</b> ${d.pilier}</p>
    <p><b>Kinoe:</b> ${d.kinoe}</p>
    <p><b>Menace:</b> ${d.menace}</p>
    <p><b>Infos:</b> ${d.info}</p>
    <button onclick="fermer()">Fermer</button>
  `;
  modal.style.display = "flex";
};

window.fermer = () => modal.style.display = "none";

// ❌ Supprimer
window.supprimer = async function(id){
  if(confirm("Supprimer cette cible ?")){
    await deleteDoc(doc(db, "pourfendeurs", id));
    render();
  }
};

// ✏️ Modifier
window.modifier = function(id, d){
  nom.value = d.nom;
  rang.value = d.rang;
  brigade.value = d.brigade;
  souffle.value = d.souffle;
  pilier.value = d.pilier;
  kinoe.value = d.kinoe;
  info.value = d.info;
  editId = id;
};

// ➕ Ajouter / Mettre à jour
document.getElementById("form").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const file = document.getElementById("photo").files[0];
  const reader = new FileReader();

  reader.onload = async function(){
    const obj = {
      nom: nom.value,
      rang: rang.value,
      brigade: brigade.value,
      souffle: souffle.value,
      pilier: pilier.value,
      kinoe: kinoe.value,
      info: info.value,
      menace: getMenace(rang.value),
      photo: reader.result || null
    };

    if(editId){
      await updateDoc(doc(db, "pourfendeurs", editId), obj);
      editId = null;
    } else {
      await addDoc(collection(db, "pourfendeurs"), obj);
    }

    form.reset();
    render();
  };

  if(file) reader.readAsDataURL(file);
  else reader.onload();
});

render();
</script>
