<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codex-Obscura | Archives Suprêmes</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Sans+JP:wght@200;400;700&family=Charm:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #800000; --accent: #d4af37; --bg: #050508;
            --card-bg: rgba(10, 10, 15, 0.95); --text: #e0e0e0;
            --gold: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --terminal: #00ff66;
            --color-eau: #00a2ff; --color-flamme: #ff4500; --color-foudre: #ffff00;
            --color-roche: #8b4513; --color-brume: #a0a0a0; --color-fleur: #ffb6c1;
            --color-son: #daa520; --color-vent: #00ff9d; --color-tombeau: #555555;
        }

        @keyframes shine { 0% { background-position: -200%; } 100% { background-position: 200%; } }
        @keyframes float { 0% { transform: translateY(110vh) rotate(0deg); opacity: 0; } 50% { opacity: 0.6; } 100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        * { box-sizing: border-box; scroll-behavior: smooth; }
        body {
            font-family: 'Noto Sans JP', sans-serif; background: var(--bg);
            color: var(--text); margin: 0; padding: 60px 15px; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-animation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1a0505 0%, #020204 100%); z-index: -1; }
        .particle { position: absolute; background: var(--accent); border-radius: 50%; opacity: 0.3; animation: float 15s infinite linear; pointer-events: none; }

        .header-title {
            font-family: 'Cinzel', serif; font-size: clamp(2.5rem, 8vw, 5rem); font-weight: 900; 
            letter-spacing: 12px; margin: 0; background: var(--gold);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-size: 200% auto; animation: shine 6s linear infinite; text-align: center;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.3));
        }

        .global-stats { 
            font-family: 'Cinzel', serif; color: var(--accent); margin: 20px 0 40px; 
            border-bottom: 1px solid rgba(212, 175, 55, 0.2); padding-bottom: 15px; 
            text-transform: uppercase; letter-spacing: 5px; font-size: 0.85rem; text-align: center;
        }

        #authBar {
            position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.8);
            padding: 10px 20px; border: 1px solid var(--accent); border-radius: 5px;
            z-index: 100; font-family: 'Cinzel', serif; backdrop-filter: blur(10px);
            display: flex; gap: 12px; align-items: center; box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        #authBar input { background: #111; border: 1px solid #333; color: var(--accent); width: 110px; padding: 8px; outline: none; font-size: 0.8rem; border-radius: 3px; }

        #adminPanel, #terminalContainer, #mainForm { 
            display: none; width: 100%; max-width: 1000px; background: var(--card-bg); 
            border: 1px solid rgba(212, 175, 55, 0.3); margin-bottom: 30px; padding: 30px; 
            border-top: 4px solid var(--accent); animation: fadeIn 0.8s ease-out;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); border-radius: 8px;
        }

        #terminalLogs { height: 140px; overflow-y: auto; font-family: monospace; color: var(--terminal); background: #000; padding: 15px; border: 1px solid #222; font-size: 0.85rem; border-radius: 4px; }

        input, select, textarea { background: rgba(255,255,255,0.03); border: 1px solid #333; color: #fff; padding: 14px; outline: none; transition: 0.3s; border-radius: 4px; }
        select option { background: #fff; color: #000; }

        #btnSubmit { 
            grid-column: 1 / -1; background: transparent; color: var(--accent); border: 2px solid var(--accent); 
            padding: 18px; cursor: pointer; font-family: 'Cinzel'; letter-spacing: 5px; font-weight: bold;
            transition: 0.4s; text-transform: uppercase; border-radius: 4px;
        }
        #btnSubmit:hover { background: var(--accent); color: #000; box-shadow: 0 0 30px rgba(212, 175, 55, 0.5); }

        .registry-wrapper { width: 100%; max-width: 1100px; padding-bottom: 100px; }
        .breath-group { margin-bottom: 50px; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; overflow: hidden; animation: fadeIn 0.8s ease-out; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .breath-header { padding: 20px 35px; background: rgba(255,255,255,0.02); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .breath-header h3 { font-family: 'Charm'; font-size: 2.2rem; margin: 0; text-shadow: 0 0 15px currentColor; }
        .member-list { width: 100%; border-collapse: collapse; }
        .member-list td { padding: 18px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .pseudo { font-family: 'Cinzel'; cursor: pointer; font-weight: 700; color: #fff; font-size: 1.1rem; letter-spacing: 1.5px; transition: 0.3s; }
        .pseudo.mort { text-decoration: line-through; color: #666 !important; opacity: 0.6; }
        .badge { padding: 6px 12px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; border-radius: 4px; display: inline-block; min-width: 110px; border: 1px solid; }
        .Pilier { background: rgba(128, 0, 0, 0.3); border-color: #ff0000; color: #ff9999; box-shadow: 0 0 10px rgba(255,0,0,0.2); }
        .Kinoe { background: rgba(212, 175, 55, 0.1); border-color: var(--accent); color: var(--accent); }

        /* Styles spécifique Veilleurs */
        .v-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .v-pass-toggle { 
            font-family: monospace; background: rgba(0,0,0,0.5); padding: 5px 12px; 
            color: #444; border-radius: 4px; border: 1px solid #333; cursor: pointer;
            transition: 0.3s; letter-spacing: 2px;
        }
        .v-pass-toggle:hover { border-color: var(--accent); color: var(--text); }
        .v-pass-toggle.revealed { color: var(--terminal); border-color: var(--terminal); letter-spacing: 0px; }

        /* Couleurs Souffles */
        .breath-Eau { border-left: 8px solid var(--color-eau); } .breath-Eau h3 { color: var(--color-eau); }
        .breath-Flamme { border-left: 8px solid var(--color-flamme); } .breath-Flamme h3 { color: var(--color-flamme); }
        .breath-Foudre { border-left: 8px solid var(--color-foudre); } .breath-Foudre h3 { color: var(--color-foudre); }
        .breath-Roche { border-left: 8px solid var(--color-roche); } .breath-Roche h3 { color: var(--color-roche); }
        .breath-Brume { border-left: 8px solid var(--color-brume); } .breath-Brume h3 { color: var(--color-brume); }
        .breath-Fleur { border-left: 8px solid var(--color-fleur); } .breath-Fleur h3 { color: var(--color-fleur); }
        .breath-Son { border-left: 8px solid var(--color-son); } .breath-Son h3 { color: var(--color-son); }
        .breath-Tombeau { border-left: 8px solid var(--color-tombeau); opacity: 0.8; } .breath-Tombeau h3 { color: #888; }

        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(30px); }
        #modalContent { width: 95%; max-width: 900px; background: #050508; border: 1px solid var(--accent); position: relative; animation: fadeIn 0.4s ease-out; border-radius: 8px; overflow: hidden; box-shadow: 0 0 50px rgba(212,175,55,0.2); }
        .info-header { background: linear-gradient(to bottom, #1a1a20, #050508); padding: 40px 20px; text-align: center; border-bottom: 1px solid rgba(212, 175, 55, 0.2); }
        .info-body { padding: 40px; display: grid; grid-template-columns: 300px 1fr; gap: 40px; }
        .info-photo-container { border: 2px solid var(--accent); padding: 8px; background: #000; }
        .info-photo-container img { width: 100%; height: auto; display: block; border-radius: 2px; }
        .info-label { color: var(--accent); font-family: 'Cinzel'; font-size: 0.7rem; border-bottom: 1px solid rgba(212, 175, 55, 0.1); margin-bottom: 8px; display: block; letter-spacing: 2px; opacity: 0.8; }
        .info-value { color: #fff; margin-bottom: 25px; display: block; font-size: 1.3rem; font-weight: 700; }
        .info-obs { grid-column: 1 / -1; background: rgba(255,255,255,0.03); padding: 25px; border-left: 4px solid var(--accent); font-family: 'Charm'; font-size: 1.6rem; color: #ddd; line-height: 1.4; }

        @media (max-width: 800px) { .info-body { grid-template-columns: 1fr; } .info-photo-container { max-width: 200px; margin: 0 auto; } }
    </style>
</head>
<body>

    <div class="bg-animation" id="bgAnim"></div>

    <div id="authBar">
        <span id="statusBadge" style="color:var(--accent); font-weight:bold; font-size:0.75rem; letter-spacing:1px;">VISITEUR</span>
        <input type="text" id="userInput" placeholder="NOM">
        <input type="password" id="passInput" placeholder="SCEAU" onkeypress="handleLogin(event)">
    </div>

    <h1 class="header-title">Codex-Obscura</h1>
    <div class="global-stats">✧ REGISTRE DES POURFENDEURS ✧ <br> EFFECTIF SOUS SURVEILLANCE : <span id="totalCount" style="color:white; font-size:1.5rem; text-shadow: 0 0 10px #fff;">0</span></div>

    <div id="adminPanel">
        <h3 style="font-family:'Cinzel'; color:var(--accent); margin-top:0; letter-spacing:3px;">ACCRÉDITATIONS DES VEILLEURS</h3>
        <div style="display:flex; gap:15px; margin-bottom:25px;">
            <input type="text" id="newVName" placeholder="NOM DU NOUVEAU VEILLEUR" style="flex:1">
            <button onclick="addVeilleur()" id="btnSubmit" style="margin:0; padding:10px 25px; flex:0.4; font-size:0.8rem;">GÉNÉRER SCEAU</button>
        </div>
        <div id="veilleursList" style="max-height:250px; overflow-y:auto; background:rgba(0,0,0,0.4); border-radius:8px; border: 1px solid #222;"></div>
    </div>

    <div id="terminalContainer">
        <div id="terminalLogs">> Flux de données activé...</div>
    </div>

    <form id="mainForm" style="grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px;">
        <input type="text" id="nom" placeholder="NOM DU POURFENDEUR" required>
        <select id="rang">
            <option value="Mizunoto">RANG : MIZUNOTO</option>
            <option value="Mizunoe">RANG : MIZUNOE</option>
            <option value="Kanoto">RANG : KANOTO</option>
            <option value="Kanoe">RANG : KANOE</option>
            <option value="Tsuchinoto">RANG : TSUCHINOTO</option>
            <option value="Tsuchinoe">RANG : TSUCHINOE</option>
            <option value="Hinoto">RANG : HINOTO</option>
            <option value="Hinoe">RANG : HINOE</option>
            <option value="Kinoto">RANG : KINOTO</option>
            <option value="Kinoe">RANG : KINOE</option>
            <option value="Pilier">RANG : PILIER</option>
        </select>
        <select id="souffle">
            <option value="Inconnu">SOUFFLE / CATÉGORIE</option>
            <option value="Souffle de l'Eau">Souffle de l'Eau</option>
            <option value="Souffle de la Flamme">Souffle de la Flamme</option>
            <option value="Souffle de la Foudre">Souffle de la Foudre</option>
            <option value="Souffle de la Fleur">Souffle de la Fleur</option>
            <option value="Souffle de la Roche">Souffle de la Roche</option>
            <option value="Souffle de la Brume">Souffle de la Brume</option>
            <option value="Souffle du Son">Souffle du Son</option>
        </select>
        <select id="statut"><option value="Vivant">STATUT : VIVANT</option><option value="Mort">STATUT : DÉCÉDÉ</option></select>
        <input type="text" id="pilier_ref" placeholder="PILIER RÉFÉRENT">
        <input type="text" id="kinoe_ref" placeholder="KINOÉ RÉFÉRENT">
        <input type="text" id="brigade" placeholder="BRIGADES">
        <input type="number" id="jours" placeholder="JOURS DE SERVICE">
        <input type="text" id="sign" placeholder="SCELLÉ PAR" readonly>
        <textarea id="info" placeholder="Rédiger les chroniques ou observations ici..." style="grid-column: 1 / -1; min-height: 100px;"></textarea>
        <div style="grid-column: 1 / -1;">
            <label style="border: 2px dashed #444; padding: 30px; display: block; text-align: center; cursor: pointer;">
                <span id="photoTxt" style="color:var(--accent); font-weight:bold;">💠 SCELLER LE PORTRAIT</span>
                <input type="file" id="photo" style="display:none" onchange="document.getElementById('photoTxt').innerText='✅ PORTRAIT RÉCEPTIONNÉ'">
            </label>
        </div>
        <button type="submit" id="btnSubmit">ENREGISTRER DANS LE CODEX</button>
    </form>

    <div class="registry-wrapper" id="registryBody"></div>

    <div id="modal">
        <div id="modalContent">
            <span onclick="document.getElementById('modal').style.display='none'" style="position:absolute; top:20px; right:30px; cursor:pointer; font-size:3rem; color:var(--accent); z-index:100;">&times;</span>
            <div id="details"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, serverTimestamp, query, where, getDocs, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDHc5tFYxaWeGUkrxrGJAFjeEe1RJEJTHU",
            authDomain: "archives-demoniaques.firebaseapp.com",
            projectId: "archives-demoniaques",
            storageBucket: "archives-demoniaques.firebasestorage.app",
            messagingSenderId: "660726727180",
            appId: "1:660726727180:web:de33021940c7c8b0d8a429"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentRole = "visiteur";
        let activeUser = "";
        let records = [];

        window.handleLogin = async (e) => {
            if(e.key === "Enter") {
                const u = document.getElementById("userInput").value;
                const p = document.getElementById("passInput").value;
                if(u === "admin" && p === "admin") { setSession("gerant", "ADMINISTRATEUR"); }
                else {
                    const q = query(collection(db, "users"), where("username", "==", u), where("password", "==", p));
                    const snap = await getDocs(q);
                    if(!snap.empty) { setSession("veilleur", u); }
                    else { alert("Accès refusé."); }
                }
            }
        };

        function setSession(role, name) {
            currentRole = role; activeUser = name;
            document.getElementById("statusBadge").innerText = name.toUpperCase();
            document.getElementById("mainForm").style.display = "grid";
            document.getElementById("sign").value = name;
            if(role === "gerant") {
                document.getElementById("adminPanel").style.display = "block";
                document.getElementById("terminalContainer").style.display = "block";
                loadVeilleurs(); loadLogs();
            }
            renderTable();
        }

        // --- FONCTION DE MASQUAGE/RÉVÉLATION DU SCEAU ---
        window.toggleSceau = (element, password) => {
            if (element.classList.contains('revealed')) {
                element.innerText = "••••••••";
                element.classList.remove('revealed');
            } else {
                element.innerText = password;
                element.classList.add('revealed');
            }
        };

        function loadVeilleurs() {
            onSnapshot(collection(db, "users"), (snap) => {
                const div = document.getElementById("veilleursList"); div.innerHTML = "";
                snap.forEach(d => {
                    const u = d.data();
                    div.innerHTML += `
                    <div class="v-item">
                        <span style="font-weight:bold; color:var(--accent); font-family:Cinzel;">${u.username}</span>
                        <div style="display:flex; align-items:center; gap:15px;">
                            <span class="v-pass-toggle" onclick="toggleSceau(this, '${u.password}')">••••••••</span>
                            <button onclick="revok('${d.id}','${u.username}')" style="color:#ff3300; background:none; border:none; cursor:pointer; font-weight:bold; font-size:0.8rem;">RÉVOQUER</button>
                        </div>
                    </div>`;
                });
            });
        }

        async function logAction(action, cible) {
            await addDoc(collection(db, "logs"), { user: activeUser, action: action, target: cible, date: serverTimestamp() });
        }

        function loadLogs() {
            const q = query(collection(db, "logs"), orderBy("date", "desc"), limit(30));
            onSnapshot(q, (snap) => {
                const box = document.getElementById("terminalLogs"); box.innerHTML = "";
                snap.forEach(d => {
                    const l = d.data();
                    const t = l.date ? new Date(l.date.seconds * 1000).toLocaleTimeString() : "..";
                    box.innerHTML += `<div>[${t}] ${l.user} : ${l.action} -> ${l.target}</div>`;
                });
            });
        }

        window.addVeilleur = async () => {
            const n = document.getElementById("newVName").value;
            if(!n) return;
            const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
            let pass = ""; for (let i = 0; i < 8; i++) pass += chars.charAt(Math.floor(Math.random() * chars.length));
            await addDoc(collection(db, "users"), { username: n, password: pass });
            logAction("AUTORISATION", n);
            document.getElementById("newVName").value = "";
        };

        window.revok = async (id, name) => { if(confirm(`Révoquer ${name} ?`)) { await deleteDoc(doc(db, "users", id)); logAction("RÉVOCATION", name); } };

        function renderTable() {
            const breathAssets = { "Souffle de l'Eau": "🌊", "Souffle de la Flamme": "🔥", "Souffle de la Foudre": "⚡", "Souffle de la Fleur": "🌸", "Souffle de la Roche": "🪨", "Souffle de la Brume": "🌫️", "Souffle du Son": "🔊", "TOMBEAU": "🕯️" };
            onSnapshot(collection(db, "pourfendeurs"), (snap) => {
                records = []; snap.forEach(s => records.push({ id: s.id, ...s.data() }));
                document.getElementById("totalCount").innerText = records.length;
                const container = document.getElementById("registryBody"); container.innerHTML = "";
                const sections = records.reduce((acc, r) => {
                    const s = r.statut === "Mort" ? "TOMBEAU" : (r.souffle || "Inconnu");
                    if(!acc[s]) acc[s] = []; acc[s].push(r); return acc;
                }, {});
                Object.keys(sections).sort().forEach(sec => {
                    const div = document.createElement("div");
                    div.className = `breath-group breath-${sec.split(' ').pop()}`;
                    let html = `<div class="breath-header"><h3>${breathAssets[sec] || '⚔️'} ${sec.toUpperCase()}</h3></div><table class="member-list">`;
                    sections[sec].forEach(m => {
                        let btns = currentRole !== "visiteur" ? `<td><button onclick="preModif('${m.id}')" style="background:none; border:none; cursor:pointer;">🖋️</button> ${currentRole === 'gerant' ? `<button onclick="delRec('${m.id}')" style="background:none; border:none; cursor:pointer; color:red; margin-left:10px">✖</button>` : ''}</td>` : "";
                        html += `<tr><td style="width:20%"><span class="badge ${m.rang}">${m.rang}</span></td><td style="text-align:left"><span class="pseudo ${m.statut === 'Mort' ? 'mort' : ''}" onclick="showRec('${m.id}')">${m.nom}</span></td><td style="color:#666; font-size:0.8rem;">${m.jours || 0}d</td>${btns}</tr>`;
                    });
                    div.innerHTML = html + "</table>";
                    container.appendChild(div);
                });
            });
        }

        document.getElementById("mainForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const photoFile = document.getElementById("photo").files[0];
            let img = null;
            if(photoFile) img = await new Promise(r => {
                const reader = new FileReader(); reader.readAsDataURL(photoFile);
                reader.onload = () => r(reader.result);
            });
            const data = {
                nom: document.getElementById("nom").value, rang: document.getElementById("rang").value,
                souffle: document.getElementById("souffle").value, statut: document.getElementById("statut").value,
                pilier_ref: document.getElementById("pilier_ref").value, kinoe_ref: document.getElementById("kinoe_ref").value,
                brigade: document.getElementById("brigade").value, jours: document.getElementById("jours").value,
                info: document.getElementById("info").value, 
                veilleur: activeUser,
                photo: img || (window.editId ? records.find(r=>r.id===window.editId).photo : null),
                date: serverTimestamp()
            };
            if(window.editId) { await updateDoc(doc(db, "pourfendeurs", window.editId), data); logAction("MODIFICATION", data.nom); window.editId = null; }
            else { await addDoc(collection(db, "pourfendeurs"), data); logAction("INSCRIPTION", data.nom); }
            document.getElementById("mainForm").reset();
            document.getElementById("sign").value = activeUser;
            document.getElementById("photoTxt").innerText = "💠 SCELLER LE PORTRAIT";
        });

        window.delRec = async (id) => { const r = records.find(x => x.id === id); if(confirm(`Supprimer ${r.nom} ?`)) { await deleteDoc(doc(db, "pourfendeurs", id)); logAction("SUPPRESSION", r.nom); } };

        window.preModif = (id) => {
            const d = records.find(r => r.id === id); window.editId = id;
            document.getElementById("nom").value = d.nom;
            document.getElementById("rang").value = d.rang;
            document.getElementById("souffle").value = d.souffle;
            document.getElementById("statut").value = d.statut;
            document.getElementById("pilier_ref").value = d.pilier_ref || "";
            document.getElementById("kinoe_ref").value = d.kinoe_ref || "";
            document.getElementById("brigade").value = d.brigade || "";
            document.getElementById("jours").value = d.jours || 0;
            document.getElementById("info").value = d.info;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.showRec = (id) => {
            const d = records.find(r => r.id === id);
            const dateStr = d.date ? new Date(d.date.seconds * 1000).toLocaleDateString('fr-FR', {day:'numeric', month:'long', year:'numeric'}) : "Inconnue";
            document.getElementById("details").innerHTML = `
                <div class="info-header">
                    <h2 style="font-family:Cinzel; color:var(--accent); margin:0; letter-spacing:10px; font-size:2.8rem;">${d.nom.toUpperCase()}</h2>
                    <div style="margin-top:20px"><span class="badge ${d.rang}">${d.rang}</span></div>
                </div>
                <div class="info-body">
                    <div class="info-photo-container"><img src="${d.photo || 'https://via.placeholder.com/400'}" alt="Portrait"></div>
                    <div>
                        <span class="info-label">SOUFFLE</span><span class="info-value">${d.souffle}</span>
                        <span class="info-label">ÉTAT</span><span class="info-value" style="color:${d.statut === 'Mort' ? 'red' : 'var(--terminal)'}">${d.statut.toUpperCase()}</span>
                        <span class="info-label">RÉFÉRENTS</span><span class="info-value">${d.pilier_ref || '/'} | ${d.kinoe_ref || '/'}</span>
                        <span class="info-label">CHRONIQUEUR</span><span class="info-value">${d.veilleur || 'Anonyme'}</span>
                        <div class="info-obs">"${d.info}"</div>
                        <div style="text-align:right; margin-top:20px; font-size:0.7rem; color:var(--accent); font-family:monospace;">RAPPORT DU : ${dateStr}</div>
                    </div>
                </div>`;
            document.getElementById("modal").style.display = "flex";
        };

        renderTable();

        const bg = document.getElementById('bgAnim');
        for(let i=0; i<40; i++) {
            const p = document.createElement('div'); p.className = 'particle';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = (Math.random() * 10 + 10) + 's';
            bg.appendChild(p);
        }
    </script>
</body>
</html>
